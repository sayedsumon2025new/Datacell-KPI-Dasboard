        tbody.appendChild(tr);
      });
      if(!tbody.children.length)tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:30px;font-family:DM Mono,monospace;font-size:.8rem;color:var(--muted)">No data in selected range</td></tr>';
    }

    // ── LEAD TIME CHART 1: BY PERSON ──
    const parseLT=h=>h?parseFloat(h.replace('h','')):0;

    // Per-person lead time aggregation
    const ltPersonData=PERSONS.map(p=>{
      const pt=filtered.filter(k=>k.person===p&&k.leadTime);
      const totalHrs=pt.reduce((s,k)=>s+parseLT(k.leadTime),0);
      const doneHrs=pt.filter(k=>k.actualDate||k.actualTime).reduce((s,k)=>s+parseLT(k.leadTime),0);
      const pendHrs=totalHrs-doneHrs;
      return{name:p,total:+totalHrs.toFixed(1),done:+doneHrs.toFixed(1),pend:+pendHrs.toFixed(1),count:pt.length};
    }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);

    const totalLeadHrs=ltPersonData.reduce((s,x)=>s+x.total,0);
    const avgHrs=ltPersonData.length?+(totalLeadHrs/ltPersonData.length).toFixed(1):0;
    const maxPerson=ltPersonData[0]||{name:'—',total:0};
    const tasksWithLead=filtered.filter(k=>k.leadTime).length;
    const tasksNoLead=filtered.length-tasksWithLead;

    // Fill summary strip
    const ltStrip=document.getElementById('lt-summary-strip');
    if(ltStrip){
      [{l:'Total Hours Allocated',v:totalLeadHrs.toFixed(1)+'h',c:'#a3e635'},
       {l:'Avg Per Person',v:avgHrs+'h',c:'#60a5fa'},
       {l:'Heaviest Load',v:maxPerson.name.split('/')[0]+' ('+maxPerson.total+'h)',c:'#f87171'},
       {l:'Tasks w/ Lead Time',v:tasksWithLead+'/'+filtered.length,c:'#f5c842'},
      ].forEach(x=>{
        const el=document.createElement('div');
        el.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:10px';
        el.innerHTML='<span style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:800;color:'+x.c+'">'+x.v+'</span><span style="font-size:.64rem;font-family:DM Mono,monospace;color:var(--muted)">'+x.l+'</span>';
        ltStrip.appendChild(el);
      });
    }

    const ltCtx1=document.getElementById('chartLtUser')?.getContext('2d');
    if(ltCtx1){
      if(ltPersonData.length){
        new Chart(ltCtx1,{
          type:'bar',
          data:{
            labels:ltPersonData.map(x=>x.name.split('/')[0]),
            datasets:[
              {label:'Done hrs',data:ltPersonData.map(x=>x.done),backgroundColor:ltPersonData.map(x=>th(x.name).accent+'cc'),borderRadius:4,borderSkipped:false},
              {label:'Remaining hrs',data:ltPersonData.map(x=>x.pend),backgroundColor:ltPersonData.map(x=>th(x.name).accent+'33'),borderRadius:4,borderSkipped:false},
            ]
          },
          options:{
            ...cd,
            indexAxis:'y',
            scales:{
              x:{stacked:true,grid:{color:'rgba(31,37,53,.7)'},ticks:{color:'#505870'},title:{display:true,text:'Hours',color:'#505870',font:{size:9}}},
              y:{stacked:true,grid:{display:false},ticks:{color:'#dde1ec',font:{size:10}}}
            },
            plugins:{
              ...cd.plugins,
              legend:{position:'top',labels:{color:'#505870',font:{size:9}}},
              tooltip:{
                ...cd.plugins.tooltip,
                callbacks:{
                  label:ctx=>{
                    const d=ltPersonData[ctx.dataIndex];
                    if(ctx.datasetIndex===0)return' Done: '+d.done+'h ('+d.count+' tasks)';
                    return' Remaining: '+d.pend+'h';
                  },
                  afterBody:items=>{
                    const d=ltPersonData[items[0].dataIndex];
                    const vs=d.total-avgHrs;
                    return['Total: '+d.total+'h','vs Avg: '+(vs>=0?'+':'')+vs.toFixed(1)+'h '+(vs>0?'⬆ Overloaded':'⬇ Under avg')];
                  }
                }
              },
              // avg reference line annotation (manual via dataset)
            },
            // draw avg line as annotation-like dataset
          }
        });
        // Draw average line overlay annotation
        const avgLinePlugin={id:'avgLine',afterDraw:chart=>{
          const ctx2=chart.ctx;const xScale=chart.scales.x;const yScale=chart.scales.y;
          if(!xScale||!yScale)return;
          const xPx=xScale.getPixelForValue(avgHrs);
          ctx2.save();ctx2.beginPath();
          ctx2.strokeStyle='rgba(245,200,66,.6)';ctx2.lineWidth=1.5;ctx2.setLineDash([5,4]);
          ctx2.moveTo(xPx,yScale.top);ctx2.lineTo(xPx,yScale.bottom);ctx2.stroke();
          ctx2.fillStyle='#f5c842';ctx2.font='9px DM Mono,monospace';
          ctx2.fillText('avg '+avgHrs+'h',xPx+4,yScale.top+10);
          ctx2.restore();
        }};
        Chart.register(avgLinePlugin);
      } else {
        ltCtx1.canvas.closest('.chart-box').insertAdjacentHTML('beforeend','<p style="font-size:.75rem;color:var(--muted);text-align:center;padding:30px;font-family:DM Mono,monospace">No lead times set. Add in Settings → Lead Time.</p>');
      }
    }

    // ── LEAD TIME CHART 2: BY TASK (top 20) ──
    const ltTaskData=filtered.filter(k=>k.leadTime)
      .map(k=>({task:k.task.length>28?k.task.slice(0,28)+'…':k.task,hrs:parseLT(k.leadTime),person:k.person,done:!!(k.actualDate||k.actualTime),priority:k.priority}))
      .sort((a,b)=>b.hrs-a.hrs)
      .slice(0,20);

    const ltCtx2=document.getElementById('chartLtTask')?.getContext('2d');
    if(ltCtx2){
      if(ltTaskData.length){
        new Chart(ltCtx2,{
          type:'bar',
          data:{
            labels:ltTaskData.map(x=>x.task),
            datasets:[{
              label:'Lead Time (hrs)',
              data:ltTaskData.map(x=>x.hrs),
              backgroundColor:ltTaskData.map(x=>x.done?th(x.person).accent+'bb':th(x.person).accent+'44'),
              borderColor:ltTaskData.map(x=>th(x.person).accent),
              borderWidth:1,
              borderRadius:4,
              borderSkipped:false,
            }]
          },
          options:{
            ...cd,
            indexAxis:'y',
            scales:{
              x:{grid:{color:'rgba(31,37,53,.7)'},ticks:{color:'#505870'},title:{display:true,text:'Hours',color:'#505870',font:{size:9}}},
              y:{grid:{display:false},ticks:{color:'#dde1ec',font:{size:9},maxTicksLimit:20}}
            },
            plugins:{
              ...cd.plugins,
              legend:{display:false},
              tooltip:{
                ...cd.plugins.tooltip,
                callbacks:{
                  label:ctx=>{
                    const d=ltTaskData[ctx.dataIndex];
                    return[' '+d.hrs+'h · '+d.person,' Status: '+(d.done?'✓ Done':'Pending')+(d.priority?' ★':'')];
                  }
                }
              }
            }
          }
        });
      } else {
        ltCtx2.canvas.closest('.chart-box').insertAdjacentHTML('beforeend','<p style="font-size:.75rem;color:var(--muted);text-align:center;padding:30px;font-family:DM Mono,monospace">No lead times set yet.</p>');
      }
    }

    // ── LEAD TIME BALANCING TABLE ──
    const ltTbody=document.getElementById('ltTableBody');
    if(ltTbody){
      if(ltPersonData.length){
        ltPersonData.forEach(x=>{
          const t2=th(x.name);
          const vs=+(x.total-avgHrs).toFixed(1);
          const vsColor=vs>2?'#f87171':vs<-2?'#3ef0b0':'#f5c842';
          const vsLabel=vs===0?'On avg':vs>0?'+'+vs+'h overloaded':vs+'h under avg';
          const barPct=maxPerson.total>0?Math.round((x.total/maxPerson.total)*100):0;
          const tr=document.createElement('tr');
          tr.innerHTML='<td><span style="display:inline-flex;align-items:center;gap:7px">'
            +'<span style="width:22px;height:22px;border-radius:6px;background:'+t2.bg+';color:'+t2.color+';display:inline-flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;font-family:Syne,sans-serif">'+ini(x.name)+'</span>'
            +'<span style="color:'+t2.color+'">'+x.name+'</span></span></td>'
            +'<td style="font-family:DM Mono,monospace;font-size:.8rem">'+x.count+'</td>'
            +'<td style="font-family:DM Mono,monospace;font-size:.8rem;color:#a3e635;font-weight:600">'+x.total+'h</td>'
            +'<td style="font-family:DM Mono,monospace;font-size:.8rem;color:var(--muted)">'+(x.count?+(x.total/x.count).toFixed(1)+'h':'—')+'</td>'
            +'<td style="font-family:DM Mono,monospace;font-size:.8rem;color:#3ef0b0">'+x.done+'h</td>'
            +'<td style="font-family:DM Mono,monospace;font-size:.8rem;color:#f87171">'+x.pend+'h</td>'
            +'<td><div style="display:flex;align-items:center;gap:8px">'
            +'<div style="flex:1;height:5px;background:var(--border);border-radius:4px;min-width:60px"><div style="height:100%;width:'+barPct+'%;background:'+t2.accent+';border-radius:4px;transition:width .4s"></div></div>'
            +'<span style="font-family:DM Mono,monospace;font-size:.7rem;color:'+vsColor+';white-space:nowrap">'+vsLabel+'</span>'
            +'</div></td>';
          ltTbody.appendChild(tr);
        });
        // Avg row
        const avgTr=document.createElement('tr');
        avgTr.style.cssText='background:rgba(245,200,66,.04);border-top:1px solid rgba(245,200,66,.15)';
        avgTr.innerHTML='<td style="font-family:DM Mono,monospace;font-size:.72rem;color:#f5c842;letter-spacing:.06em" colspan="2">TEAM AVERAGE</td>'
          +'<td style="font-family:DM Mono,monospace;font-size:.8rem;color:#f5c842;font-weight:600">'+totalLeadHrs.toFixed(1)+'h total</td>'
          +'<td style="font-family:DM Mono,monospace;font-size:.8rem;color:#f5c842">'+avgHrs+'h / person</td>'
          +'<td colspan="3" style="font-family:DM Mono,monospace;font-size:.7rem;color:var(--muted)">'+tasksWithLead+' tasks with lead time · '+tasksNoLead+' without</td>';
        ltTbody.appendChild(avgTr);
      } else {
        ltTbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:28px;font-family:DM Mono,monospace;font-size:.8rem;color:var(--muted)">No lead times set. Go to Settings → Lead Time to add workload hours.</td></tr>';
      }
    }
  });
}

// ── ALL TASKS ──
function buildAllTasks(c){
  const sl=document.createElement('div');sl.className='section-title';sl.textContent=`ALL TASKS — ${tasks.length} TOTAL`;c.appendChild(sl);
  const list=document.createElement('div');list.className='task-list';
  const cols='36px 1fr 120px 120px 130px 70px';
  const hdr=document.createElement('div');hdr.className='tlh';hdr.style.gridTemplateColumns=cols;
  hdr.innerHTML=`<span>#</span><span>Task</span><span>Person</span>
    <span style="color:#60a5fa">${clockIcon()} Plan</span>
    <span style="color:#3ef0b0">${checkIcon()} Actual</span>
    <span style="text-align:right">Status</span>`;
  list.appendChild(hdr);
  const rows=document.createElement('div');
  tasks.forEach((k,i)=>{
    const t2=th(k.person);const isDone=getDone(k.person).has(k.sl);
    const cmp=timeCmp(k.planDate,k.planTime,k.actualDate,k.actualTime);
    const row=document.createElement('div');
    row.style.cssText=`display:grid;grid-template-columns:${cols};align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:8px;font-size:0.84rem;transition:background 0.15s;animation:rowIn 0.2s ease ${i*0.005}s both;${k.priority?'border-left:3px solid '+t2.accent+';':''}${isDone?'opacity:0.42;':''}`;
    row.innerHTML=`<span style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted)">${k.sl}</span>
      <span style="${isDone?'text-decoration:line-through':''}${k.priority?`;color:${t2.accent}`:''}">${k.task}</span>
      <span style="display:flex;align-items:center;gap:5px">
        <span style="width:20px;height:20px;border-radius:5px;background:${t2.bg};color:${t2.color};display:inline-flex;align-items:center;justify-content:center;font-size:0.56rem;font-weight:700;font-family:'Syne',sans-serif">${ini(k.person)}</span>
        <span style="color:${t2.color};font-size:0.78rem">${k.person}</span>
      </span>
      <span>${k.planTime?`<span class="time-badge plan" style="font-size:0.62rem">${clockIcon()} ${k.planTime}</span>`:'<span class="time-badge unset" style="font-size:0.62rem">—</span>'}</span>
      <span>${k.actualTime?`<span class="time-badge ${cmp==='late'?'overdue':'actual'}" style="font-size:0.62rem">${checkIcon()} ${k.actualTime}</span>`:'<span class="time-badge unset" style="font-size:0.62rem">—</span>'}</span>
      <div style="text-align:right">
        ${!k.planTime&&!k.actualTime?`<span style="font-family:'DM Mono',monospace;font-size:0.66rem;color:var(--muted);padding:3px 7px;border-radius:20px;background:rgba(255,255,255,0.04)">${isDone?'DONE':'PEND'}</span>`
        :cmp==='late'?`<span style="font-family:'DM Mono',monospace;font-size:0.64rem;color:#f87171;padding:3px 7px;border-radius:20px;background:rgba(248,113,113,0.08)">LATE</span>`
        :k.actualTime?`<span style="font-family:'DM Mono',monospace;font-size:0.64rem;color:#3ef0b0;padding:3px 7px;border-radius:20px;background:rgba(62,240,176,0.08)">✓ DONE</span>`
        :`<span style="font-family:'DM Mono',monospace;font-size:0.64rem;color:var(--muted);padding:3px 7px;border-radius:20px;background:rgba(255,255,255,0.04)">PENDING</span>`}
      </div>`;
    row.onmouseenter=()=>row.style.background='var(--surface2)';
    row.onmouseleave=()=>row.style.background='';
    rows.appendChild(row);
  });
  list.appendChild(rows);c.appendChild(list);
}

//  SETTINGS PANEL
// ═══════════════════════════════════════
function buildSettings(c){
  c.insertAdjacentHTML('beforeend',
    '<div style="font-family:Syne,sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px">System <span style="color:#f5c842">Settings</span></div>'
    +'<div style="font-size:.72rem;font-family:DM Mono,monospace;color:var(--muted);margin-bottom:18px">// USER MANAGEMENT · ACCESS CONTROL · LEAD TIME · TASK SETUP</div>'
  );
  const layout=document.createElement('div');layout.className='settings-layout';

  // ── Left Nav ──
  const nav=document.createElement('div');nav.className='settings-nav';
  const navItems=[
    {id:'users',icon:'👤',label:'USER MANAGEMENT'},
    {id:'access',icon:'🔐',label:'MODULE ACCESS'},
    {id:'tasksetup',icon:'📋',label:'TASK SETUP'},
    {id:'plantime2',icon:'📅',label:'PLAN TIME'},
    {id:'leadtime',icon:'⏱',label:'LEAD TIME'},
  ];
  navItems.forEach((item,i)=>{
    if(i===2){const sep=document.createElement('div');sep.className='snav-sep';nav.appendChild(sep);}
    const btn=document.createElement('button');btn.className='snav-btn'+(settingsTab===item.id?' active':'');
    btn.innerHTML=`<span style="font-size:.9rem">${item.icon}</span>${item.label}`;
    btn.onclick=()=>{settingsTab=item.id;renderSettingsBody(body);};
    nav.appendChild(btn);
  });

  // ── Right Body ──
  const body=document.createElement('div');body.className='settings-body';
  layout.appendChild(nav);layout.appendChild(body);
  c.appendChild(layout);
  renderSettingsBody(body);
}

function renderSettingsBody(body){
  body.innerHTML='';
  // Re-mark active nav
  document.querySelectorAll('.snav-btn').forEach(btn=>{
    const lbl=btn.textContent.trim();
    const map={users:'USER MANAGEMENT',access:'MODULE ACCESS',tasksetup:'TASK SETUP',plantime2:'PLAN TIME',leadtime:'LEAD TIME'};
    btn.classList.toggle('active',map[settingsTab]===lbl);
  });
  if(settingsTab==='users')renderSettingsUsers(body);
  else if(settingsTab==='access')renderSettingsAccess(body);
  else if(settingsTab==='tasksetup')renderSettingsTaskSetup(body);
  else if(settingsTab==='plantime2')renderSettingsPlanTime(body);
  else if(settingsTab==='leadtime')renderSettingsLeadTime(body);
}

// ── SECTION 1: USER MANAGEMENT ──────────────────
function renderSettingsUsers(body){
  body.insertAdjacentHTML('beforeend',
    '<div class="s-section-title">👤 User Management</div>'
    +'<div class="s-section-sub">// ADD NEW USERS · CHANGE PASSWORDS · REMOVE USERS</div>'
  );

  // Add user form
  let selectedColor=COLOR_PALETTE[Math.floor(Math.random()*COLOR_PALETTE.length)];
  const addForm=document.createElement('div');addForm.className='add-user-form';
  addForm.innerHTML='<h4>+ Add New User</h4>'
    +'<div class="aug">'
    +'<div class="fg"><label>FULL NAME</label><input type="text" class="fi" id="nu-name" placeholder="e.g. Fatima" style="padding:9px 12px;font-size:.85rem"></div>'
    +'<div class="fg"><label>PASSWORD</label><input type="text" class="fi" id="nu-pass" placeholder="Set password" style="padding:9px 12px;font-size:.85rem"></div>'
    +'<div class="fg"><label>COLOR</label>'
    +'<div id="nu-color-preview" style="height:38px;border-radius:9px;border:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;background:var(--surface2)">'
    +'<div id="nu-swatch" style="width:16px;height:16px;border-radius:4px;background:'+selectedColor+'"></div>'
    +'<span id="nu-color-val" style="font-family:DM Mono,monospace;font-size:.7rem;color:var(--muted)">'+selectedColor+'</span>'
    +'</div></div>'
    +'<button class="add-btn" id="nu-submit" style="height:38px;font-size:.82rem">ADD USER</button>'
    +'</div>'
    +'<div class="color-swatch-row" style="margin-top:12px">'
    +COLOR_PALETTE.map((c2,i)=>`<div class="cswatch${c2===selectedColor?' selected':''}" style="background:${c2}" data-color="${c2}" title="${c2}"></div>`).join('')
    +'</div>';
  body.appendChild(addForm);

  // Swatch click
  addForm.querySelectorAll('.cswatch').forEach(sw=>{
    sw.onclick=()=>{
      addForm.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('selected'));

      document.getElementById('nu-swatch').style.background=selectedColor;
      document.getElementById('nu-color-val').textContent=selectedColor;
    };
  });

  // Submit
  document.getElementById('nu-submit').onclick=()=>{
    const name=document.getElementById('nu-name').value.trim();
    const pass=document.getElementById('nu-pass').value.trim();
    if(!name){toast('Enter a user name','error');return;}
    if(!pass){toast('Enter a password','error');return;}
    if(CREDS[name]!==undefined){toast('User "'+name+'" already exists','error');return;}
    // Register
    CREDS[name]=pass;
    if(!PERSONS.includes(name))PERSONS.push(name);
    userRegistry.push({name,password:pass,color:selectedColor});
    // Add to TH dynamically
    const acc=selectedColor;
    const rgb=hexToRgb(acc);
    TH[name]={bg:`rgba(${rgb},0.15)`,color:selectedColor,accent:selectedColor};
    toast('User "'+name+'" added successfully','success');
    renderSettingsBody(body);
  };

  // User cards
  const sl=document.createElement('div');sl.className='section-title';sl.textContent='CURRENT USERS ('+userRegistry.length+')';body.appendChild(sl);
  const grid=document.createElement('div');grid.className='user-card-grid';
  userRegistry.forEach(u=>{
    const t2=th(u.name);
    const card=document.createElement('div');card.className='user-card';
    card.style.borderColor=u.color+'33';
    card.innerHTML='<div class="user-card-av" style="background:'+t2.bg+';color:'+u.color+'">'+ini(u.name)+'</div>'
      +'<div class="user-card-info">'
      +'<div class="user-card-name" style="color:'+u.color+'">'+u.name+'</div>'
      +'<div class="user-card-pass">PW: '+u.password+'</div>'
      +'</div>'
      +'<button class="user-card-pw-btn" data-name="'+u.name+'" title="Change password">🔑</button>'
      +'<button class="user-card-del" data-name="'+u.name+'" title="Remove user">✕</button>';
    grid.appendChild(card);
  });
  body.appendChild(grid);

  // Password edit panel container
  const pwEditWrap=document.createElement('div');pwEditWrap.id='pw-edit-wrap';
  body.appendChild(pwEditWrap);

  // 🔑 Password change handler
  let activePwUser=null;
  grid.querySelectorAll('.user-card-pw-btn').forEach(btn=>{
    btn.onclick=()=>{
      const name=btn.dataset.name;
      if(activePwUser===name){activePwUser=null;pwEditWrap.innerHTML='';grid.querySelectorAll('.user-card-pw-btn').forEach(b=>b.style.color='');return;}
      activePwUser=name;
      grid.querySelectorAll('.user-card-pw-btn').forEach(b=>b.style.color=b.dataset.name===name?'#f5c842':'');
      const u=userRegistry.find(x=>x.name===name);
      const t2=th(name);
      pwEditWrap.innerHTML='';
      const panel=document.createElement('div');panel.className='pw-edit-panel';
      panel.innerHTML='<h5>'
        +'<span style="width:22px;height:22px;border-radius:6px;background:'+t2.bg+';color:'+u.color+';display:inline-flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;font-family:Syne,sans-serif">'+ini(name)+'</span>'
        +'Change Password — <span style="color:'+u.color+'">'+name+'</span>'
        +'</h5>'
        +'<div class="pw-edit-row">'
        +'<div class="fg" style="flex:1;min-width:150px"><label>NEW PASSWORD</label>'
        +'<input type="password" class="fi" id="pw-new" placeholder="Enter new password" style="padding:9px 12px;font-size:.85rem" autocomplete="new-password"></div>'
        +'<div class="fg" style="flex:1;min-width:150px"><label>CONFIRM PASSWORD</label>'
        +'<input type="password" class="fi" id="pw-confirm" placeholder="Confirm new password" style="padding:9px 12px;font-size:.85rem" autocomplete="new-password"></div>'
        +'<button class="add-btn" id="pw-save-btn" style="height:38px;font-size:.82rem">UPDATE</button>'
        +'<button class="dr-clear" id="pw-cancel-btn" style="height:38px">Cancel</button>'
        +'</div>'
        +'<div style="margin-top:8px;font-family:DM Mono,monospace;font-size:.64rem;color:var(--muted)">Current: <span style="color:var(--text)">'+u.password+'</span></div>';
      pwEditWrap.appendChild(panel);
      document.getElementById('pw-save-btn').onclick=()=>{
        const np=document.getElementById('pw-new').value;
        const cp=document.getElementById('pw-confirm').value;
        if(!np){toast('Enter new password','error');return;}
        if(np.length<3){toast('Min 3 characters required','error');return;}
        if(np!==cp){toast('Passwords do not match','error');return;}
        CREDS[name]=np;const reg=userRegistry.find(x=>x.name===name);if(reg)reg.password=np;
        toast('\u2713 Password updated for '+name,'success');activePwUser=null;
        renderSettingsBody(body);
      };

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

    const np=document.getElementById('admin-newpass').value;
    const cp=document.getElementById('admin-confirmpass').value;

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">'
    +[{l:'Tasks with Lead Time',v:withLead,c:'#a3e635'},{l:'Not Set',v:noLead,c:'#505870'}]
    .map(x=>'<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:10px"><span style="font-family:Syne,sans-serif;font-size:1.3rem;font-weight:800;color:'+x.c+'">'+x.v+'</span><span style="font-size:.66rem;font-family:DM Mono,monospace;color:var(--muted)">'+x.l+'</span></div>').join('')
    +'</div>'
  );

  // Bulk set by person
  const pOpts='<option value="">All Persons</option>'+PERSONS.map(p=>`<option value="${p}">${p}</option>`).join('');
  const fr2=document.createElement('div');fr2.className='filter-row';
  fr2.innerHTML='<div class="search-wrap"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="lt-q" placeholder="Search tasks..."></div>'
    +'<select class="field-select" id="lt-pf">'+pOpts+'</select>'
    +'<button class="fbtn" id="lt-unset">Unset Only</button>';
  body.appendChild(fr2);

  // Bulk set panel
  const bulk=document.createElement('div');
  bulk.style.cssText='background:rgba(163,230,53,.04);border:1px solid rgba(163,230,53,.15);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap';
  bulk.innerHTML='<span style="font-family:DM Mono,monospace;font-size:.68rem;color:#a3e635">BULK SET</span>'
    +'<input type="number" class="lead-inp" id="lt-bulk-val" placeholder="Hours" min="0" step="0.5" style="width:90px">'
    +'<button class="lead-save" id="lt-bulk-btn">Apply to Filtered</button>'
    +'<button class="fbtn" id="lt-clear-all" style="font-size:.65rem">Clear All Lead Times</button>';
  body.appendChild(bulk);

  const wrap2=document.createElement('div');body.appendChild(wrap2);
  let ltShowUnset=false;

  const drawLT=()=>{
    const q=(document.getElementById('lt-q')?.value||'').toLowerCase();
    const pf=document.getElementById('lt-pf')?.value||'';
    let fil=tasks.filter(k=>{
      if(q&&!k.task.toLowerCase().includes(q)&&!k.person.toLowerCase().includes(q))return false;
      if(pf&&k.person!==pf)return false;
      if(ltShowUnset&&k.leadTime)return false;
      return true;
    });
    wrap2.innerHTML='';
    const list=document.createElement('div');list.className='task-list';
    const cols='30px 1fr 100px 100px 90px';
    const hdr=document.createElement('div');hdr.className='tlh';hdr.style.gridTemplateColumns=cols;
    hdr.innerHTML='<span>#</span><span>Task</span><span>Person</span><span>Lead Time</span><span></span>';
    list.appendChild(hdr);
    if(!fil.length){list.innerHTML+='<div class="empty-msg">No tasks found</div>';wrap2.appendChild(list);return;}
    fil.forEach((k,i)=>{
      const t2=th(k.person);const row=document.createElement('div');
      row.style.cssText='display:grid;grid-template-columns:'+cols+';align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:8px;font-size:.82rem;animation:rowIn .18s ease '+i*0.008+'s both;'+(k.priority?'border-left:3px solid '+t2.accent+';':'');
      const curHrs=k.leadTime?k.leadTime.replace('h',''):'';
      row.innerHTML='<span style="font-family:DM Mono,monospace;font-size:.66rem;color:var(--muted)">'+k.sl+'</span>'
        +'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.8rem">'+k.task+(k.priority?' <span style="color:'+t2.accent+'">★</span>':'')+'</span>'
        +'<span style="color:'+t2.color+';font-size:.74rem">'+k.person.split('/')[0]+'</span>'
        +'<div style="display:flex;align-items:center;gap:5px">'+(k.leadTime?'<span class="lead-badge">'+k.leadTime+'</span>':'<span style="font-family:DM Mono,monospace;font-size:.66rem;color:var(--muted)">—</span>')+'</div>'
        +'<div style="display:flex;align-items:center;gap:5px"><input type="number" class="lead-inp lt-inp" id="lt-'+k.sl+'" value="'+curHrs+'" placeholder="hrs" min="0" step="0.5"><button class="lead-save lt-save" data-sl="'+k.sl+'">SET</button></div>';
      list.appendChild(row);
    });
    wrap2.appendChild(list);
    wrap2.querySelectorAll('.lt-save').forEach(btn=>{
      btn.onclick=()=>{
        const sl=+btn.dataset.sl;const k=tasks.find(t=>t.sl===sl);if(!k)return;
        const val=document.getElementById('lt-'+sl)?.value;
        k.leadTime=val?parseFloat(val)+'h':'';
        toast(k.leadTime?'Lead time set: '+k.task+' → '+k.leadTime:'Lead time cleared for #'+sl,'success');
        drawLT();
      };
    });
    // Bulk
    document.getElementById('lt-bulk-btn').onclick=()=>{
      const val=document.getElementById('lt-bulk-val')?.value;
      if(!val){toast('Enter hours first','error');return;}
      fil.forEach(k=>{k.leadTime=parseFloat(val)+'h';});
      toast('Lead time set to '+val+'h for '+fil.length+' tasks','success');
      drawLT();
    };
    document.getElementById('lt-clear-all').onclick=()=>{
      confirm2('Clear All Lead Times?','This will remove lead time from ALL tasks.',()=>{tasks.forEach(t=>{t.leadTime='';});toast('All lead times cleared','info');drawLT();});
    };
  };

  drawLT();
  document.getElementById('lt-q').oninput=drawLT;
  document.getElementById('lt-pf').onchange=drawLT;
  document.getElementById('lt-unset').onclick=()=>{ltShowUnset=!ltShowUnset;document.getElementById('lt-unset').classList.toggle('on',ltShowUnset);drawLT();};
}


</script>
